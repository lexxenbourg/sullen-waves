<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warp player prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0c0b0e; --paper:#e8e4dc; --dim:#8d8780; --accent:#c9a25c; --red:#e6332a; --rule:#2a2730; --faint:#211f26; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--paper); font-family:"Bodoni Moda",serif;
        min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:26px; user-select:none; -webkit-user-select:none; padding:30px; }
  .mono{ font-family:"JetBrains Mono",monospace; letter-spacing:.24em; text-transform:uppercase; }

  .player{ width:560px; max-width:100%; display:flex; gap:18px; align-items:center;
           background:#0f0e12; border:1px solid var(--rule); padding:16px; overflow:hidden; }
  .cover{ width:96px; height:96px; flex:none; overflow:hidden; position:relative; background:#000; }
  .cover img{ width:100%; height:100%; object-fit:cover; display:block; will-change:transform,opacity; }

  .mid{ flex:1; min-width:0; }
  .row{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .title{ font-size:21px; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; will-change:transform,opacity; }
  .idx{ font-size:10px; color:var(--dim); flex:none; }
  .idx b{ color:var(--accent); }

  .wave{ position:relative; height:64px; margin:10px 0 8px; cursor:grab; touch-action:none;
         display:flex; align-items:center; gap:2px; overflow:hidden; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); }
  .wave.grab{ cursor:grabbing; }
  .wave .bars{ position:absolute; inset:0; display:flex; align-items:center; gap:2px; padding:0 1px; transform-origin:center; will-change:transform; }
  .wave .bars i{ flex:1 1 auto; min-width:2px; background:var(--faint); border-radius:1px; }
  .wave .bars i.on{ background:var(--paper); }
  .wave .head{ position:absolute; top:0; bottom:0; width:2px; background:var(--red); left:0%; box-shadow:0 0 12px var(--red); z-index:3; }
  .wave .flag{ position:absolute; left:50%; top:6px; transform:translateX(-50%); font-size:10px; letter-spacing:.3em;
               text-transform:uppercase; color:var(--red); opacity:0; transition:opacity .15s; z-index:4; font-family:"JetBrains Mono",monospace; }
  .wave.warping .flag{ opacity:1; }

  .row2{ display:flex; justify-content:space-between; font-size:10px; color:var(--dim); }
  .row2 .warp{ color:var(--accent); }

  .ctrls{ display:flex; flex-direction:column; gap:8px; align-items:center; flex:none; }
  .ctrls .pp{ width:46px; height:46px; }
  .ctrls button{ width:34px; height:34px; border:1px solid var(--rule); background:none; color:var(--paper);
                 border-radius:50%; cursor:pointer; font-family:"JetBrains Mono",monospace; font-size:13px;
                 transition:border-color .2s,color .2s; }
  .ctrls button:hover{ border-color:var(--accent); color:var(--accent); }
  .nav{ display:flex; gap:8px; }

  .hint{ font-size:10px; color:var(--dim); max-width:560px; text-align:center; line-height:1.7; }
  .hint b{ color:var(--accent); }
  .stat{ font-size:10px; color:var(--dim); }
</style>
</head>
<body>
  <div class="player">
    <div class="cover" id="cover"><img id="art" alt=""></div>
    <div class="mid">
      <div class="row"><span class="title" id="title">—</span><span class="idx mono"><b id="idxN">01</b>/<span id="idxT">03</span></span></div>
      <div class="wave" id="pad">
        <div class="bars" id="bars"></div>
        <div class="head" id="head"></div>
        <div class="flag">warping</div>
      </div>
      <div class="row2 mono"><span id="cur">0:00</span><span class="warp" id="warp">1.00x</span><span id="dur">0:00</span></div>
    </div>
    <div class="ctrls">
      <button class="pp" id="play" aria-label="Play/pause">&#9658;</button>
      <div class="nav"><button id="prev" aria-label="Previous">&#10094;</button><button id="next" aria-label="Next">&#10095;</button></div>
    </div>
  </div>
  <div class="hint mono">Drag the wave <b>left / right</b> to move between tracks: the current song slows, hands off, and the next rises from slow up to speed. Space = play. Arrows also switch.</div>
  <div class="stat mono" id="stat">click play to load audio</div>

<script>
const TRACKS = [
  { title:"Experience from Before", art:"https://f4.bcbits.com/img/a1484070361_10.jpg", src:"assets/audio/experience-from-before.mp3" },
  { title:"King of Loneliness",     art:"https://f4.bcbits.com/img/a4171008164_10.jpg", src:"assets/audio/king-of-loneliness.mp3" },
  { title:"Seven",                  art:"https://f4.bcbits.com/img/a2612991241_10.jpg", src:"assets/audio/seven.mp3" }
];
const NBARS=64, LOW=0.16, THRESH=200; // LOW = slowest rate during transition; THRESH = px to commit

let ctx, gain, src=null, buffers=[], idx=0;
let posSec=0, dur=0, rate=1, playing=false, busy=false;
let startCtxTime=0;

const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const wrap=n=>(n%TRACKS.length+TRACKS.length)%TRACKS.length;
const fmt=s=>{ s=Math.max(0,s|0); return (s/60|0)+":"+String(s%60).padStart(2,"0"); };
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function buildBars(seed){
  let h=""; for(let i=0;i<NBARS;i++){ const v=Math.abs(Math.sin(i*0.5+seed)*0.6+Math.sin(i*0.17+seed*1.7)*0.3+Math.sin(i*0.9+seed)*0.18); h+='<i style="height:'+(clamp(0.16+v,0.12,1)*100)+'%"></i>'; }
  $("bars").innerHTML=h;
}
function paintTrack(){
  $("art").src=TRACKS[idx].art; $("title").textContent=TRACKS[idx].title;
  $("idxN").textContent=String(idx+1).padStart(2,"0"); $("idxT").textContent=String(TRACKS.length).padStart(2,"0");
  buildBars(idx*1.3+1);
}

async function ensureCtx(){ if(ctx) return; ctx=new (window.AudioContext||window.webkitAudioContext)(); gain=ctx.createGain(); gain.connect(ctx.destination); }
async function loadBuffer(i){
  if(buffers[i]) return buffers[i];
  $("stat").textContent="loading "+TRACKS[i].title+"…";
  const ab=await fetch(TRACKS[i].src).then(r=>r.arrayBuffer());
  buffers[i]=await ctx.decodeAudioData(ab); $("stat").textContent="ready"; return buffers[i];
}
function stopSrc(){ if(src){ try{src.stop();}catch(e){} try{src.disconnect();}catch(e){} src=null; } }
function startSrc(offset){
  stopSrc(); const b=buffers[idx]; if(!b) return;
  offset=clamp(offset,0,b.duration-0.04);
  src=ctx.createBufferSource(); src.buffer=b; src.playbackRate.value=rate; src.connect(gain);
  src.start(0,offset); startCtxTime=ctx.currentTime; posSec=offset; dur=b.duration;
}
function showRate(r){ rate=r; $("warp").textContent=r.toFixed(2)+"x"; $("bars").style.transform="scaleX("+(1/clamp(r,0.5,1.6))+")"; }
function setRateNow(r){ showRate(r); if(src) src.playbackRate.value=r; }
function rampRate(to,dur){ if(!src) {showRate(to);return;} const t=ctx.currentTime; src.playbackRate.cancelScheduledValues(t); src.playbackRate.setValueAtTime(rate,t); src.playbackRate.linearRampToValueAtTime(to,t+dur); showRate(to); }

async function play(){
  await ensureCtx(); if(ctx.state==="suspended") await ctx.resume();
  await loadBuffer(idx); rate=1; startSrc(posSec); setRateNow(1);
  playing=true; $("play").innerHTML="&#10074;&#10074;";
}
function pause(){ playing=false; stopSrc(); $("play").innerHTML="&#9658;"; }

// land on a track from a slow state and rise to speed
async function landOn(n){
  idx=wrap(n); posSec=0; paintTrack(); await loadBuffer(idx);
  rate=LOW; startSrc(0); setRateNow(LOW);
  $("pad").classList.add("warping");
  rampRate(1,0.8);
  await sleep(820); $("pad").classList.remove("warping");
}

// auto transition (arrows / wheel): wind current down, then land on next
async function autoSwitch(n){
  if(busy) return; busy=true;
  if(playing){ $("pad").classList.add("warping"); rampRate(LOW,0.45); await sleep(460); stopSrc(); await landOn(n); }
  else { idx=wrap(n); posSec=0; paintTrack(); }
  busy=false;
}

// progress loop
function tick(){
  if(playing && !dragging && src){ posSec+=(1/60)*rate; if(posSec>=dur){ posSec=0; startSrc(0); } }
  if(dur){ const p=clamp(posSec/dur,0,1); $("head").style.left=(p*100)+"%";
    const bars=$("bars").children, lit=Math.round(bars.length*p);
    for(let i=0;i<bars.length;i++) bars[i].classList.toggle("on", i<lit);
    $("cur").textContent=fmt(posSec); $("dur").textContent=fmt(dur); }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// DRAG left/right = scrub toward neighbour; current slows with drag, commit lands on next
const pad=$("pad");
let dragging=false, downX=0, p=0;
function visual(prog){ // prog -1..1 (neg = dragging left = toward next)
  const sh=prog*40;
  $("title").style.transform="translateX("+sh+"px)"; $("title").style.opacity=String(1-Math.abs(prog)*0.5);
  $("art").style.transform="translateX("+(sh*0.4)+"px)";
}
function resetVisual(){ $("title").style.transform=""; $("title").style.opacity=""; $("art").style.transform=""; }
pad.addEventListener("pointerdown",e=>{
  if(busy) return;
  dragging=true; downX=e.clientX; p=0; pad.classList.add("grab"); pad.setPointerCapture(e.pointerId);
});
pad.addEventListener("pointermove",e=>{
  if(!dragging) return;
  const dx=e.clientX-downX; p=clamp(dx/THRESH,-1,1);
  if(playing && src) setRateNow(clamp(1-Math.abs(p)*(1-LOW),LOW,1));
  pad.classList.toggle("warping", Math.abs(p)>0.04);
  visual(p);
});
async function endDrag(){
  if(!dragging) return; dragging=false; pad.classList.remove("grab");
  pad.classList.remove("warping"); resetVisual();
  if(Math.abs(p)>0.42){
    const target = idx + (p<0?1:-1); // drag left -> next
    busy=true; stopSrc(); await landOn(target); busy=false;
  } else if(playing && src){ rampRate(1,0.35); } // not far enough: ease back to speed
  p=0;
}
pad.addEventListener("pointerup",endDrag);
pad.addEventListener("pointercancel",endDrag);

// wheel (horizontal trackpad) = switch
let wheelAcc=0, wheelLock=false;
window.addEventListener("wheel",e=>{
  const dx=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:0; if(!dx) return; e.preventDefault();
  if(wheelLock) return; wheelAcc+=dx;
  if(Math.abs(wheelAcc)>80){ autoSwitch(idx+(wheelAcc>0?1:-1)); wheelAcc=0; wheelLock=true; setTimeout(()=>wheelLock=false,1100); }
},{passive:false});

$("play").addEventListener("click",()=>{ playing?pause():play(); });
$("prev").addEventListener("click",()=>autoSwitch(idx-1));
$("next").addEventListener("click",()=>autoSwitch(idx+1));
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") autoSwitch(idx+1);
  else if(e.key==="ArrowLeft") autoSwitch(idx-1);
  else if(e.key===" "){ e.preventDefault(); playing?pause():play(); }
});

paintTrack();
</script>
</body>
</html>
