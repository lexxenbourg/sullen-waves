<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page not found — Sullen Waves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Archivo:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>
  /* Self-contained: does not depend on sullen.css so a stale cache can't break it. */
  :root{
    --ink:#08070a; --paper:#e7dec8; --paper-dim:#867d68; --paper-faint:#524d40;
    --accent:#c9a25c; --rule:rgba(231,222,200,.14);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ min-height:100%; }
  body{
    background:var(--ink); color:var(--paper);
    font-family:"Archivo", sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100vh; display:flex; flex-direction:column;
    padding:42px clamp(24px,6vw,64px);
  }
  a{ color:inherit; text-decoration:none; }

  .chrome{ display:flex; align-items:baseline; justify-content:space-between; gap:24px; }
  .brand{ font-family:"Italiana", serif; font-size:22px; letter-spacing:.04em; color:var(--paper); }
  .chrome .tag{
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.3em;
    text-transform:uppercase; color:var(--paper-dim);
  }

  main{ flex:1; display:flex; flex-direction:column; justify-content:center; max-width:680px; padding:48px 0; }
  .eyebrow{
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.35em;
    color:var(--accent); text-transform:uppercase; display:flex; align-items:center;
    gap:14px; margin-bottom:24px;
  }
  .eyebrow::before{ content:""; width:34px; height:1px; background:var(--accent); display:inline-block; }
  .code{
    font-family:"Bodoni Moda", serif; font-weight:400; font-size:clamp(72px,16vw,156px);
    line-height:.9; letter-spacing:-.01em; color:var(--paper); margin-bottom:14px;
  }
  h1{
    font-family:"Bodoni Moda", serif; font-weight:400; font-size:clamp(22px,3.4vw,31px);
    line-height:1.22; margin-bottom:18px;
  }
  p.lede{
    font-family:"Archivo", sans-serif; font-weight:400; font-size:15px; line-height:1.7;
    color:var(--paper-dim); max-width:46ch; margin-bottom:36px;
  }

  .links{ display:flex; flex-wrap:wrap; gap:26px; }
  .links a{
    font-family:"JetBrains Mono", monospace; font-size:12px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--paper); padding-bottom:4px;
    border-bottom:1px solid var(--rule); transition:color .25s, border-color .25s;
  }
  .links a:hover{ color:var(--accent); border-color:var(--accent); }

  .foot{
    font-family:"JetBrains Mono", monospace; font-size:10.5px; letter-spacing:.28em;
    text-transform:uppercase; color:var(--paper-faint); padding-top:24px;
    border-top:1px solid var(--rule);
  }

  /* film grain, matching the rest of the site */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.93  0 0 0 0 0.86  0 0 0 0 0.72  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    mix-blend-mode:screen; opacity:.40;
  }
  @media (max-width:600px){ .links{ gap:16px 22px; } }
</style>
</head>
<body>
  <header class="chrome">
    <a class="brand" href="/">Sullen Waves</a>
    <span class="tag">Error 404</span>
  </header>

  <main>
    <p class="eyebrow">Page not found</p>
    <div class="code">404</div>
    <h1>This page is not in the catalogue.</h1>
    <p class="lede">The page you were looking for has moved, or it never existed. Everything is still a click away on the homepage.</p>
    <nav class="links">
      <a href="/">Home</a>
      <a href="/#catalog">Music</a>
      <a href="/gallery.html">Photographs</a>
    </nav>
  </main>

  <footer class="foot">Sullen Waves &middot; Alt / Grunge / Post-Rock</footer>
</body>
</html>
